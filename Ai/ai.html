<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced AI Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

/* Tombol Floating */
.chat-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    background:linear-gradient(135deg,#10a37f,#0d8f6f);
    color:#fff;
    font-size:28px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    z-index:999;
}

/* Chatbox */
.chatbox{
    position:fixed;
    bottom:95px;
    right:20px;
    width:380px;
    height:620px;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    display:none;
    flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    z-index:999;
}

/* Header */
.chat-header{
    background:linear-gradient(135deg,#10a37f,#0d8f6f);
    color:#fff;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.chat-header h2{
    font-size:18px;
}

.chat-header span{
    font-size:13px;
    opacity:.8;
}

/* Body */
.chat-body{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f9fafb;
}

.msg{
    max-width:82%;
    padding:12px 14px;
    border-radius:14px;
    margin:8px 0;
    line-height:1.5;
    font-size:14px;
    animation:fade .3s ease;
}

.user{
    background:#10a37f;
    color:#fff;
    margin-left:auto;
}

.bot{
    background:#fff;
    border:1px solid #ddd;
}

.typing{
    font-style:italic;
    color:#777;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* Footer */
.chat-footer{
    border-top:1px solid #ddd;
    padding:10px;
    display:flex;
    gap:8px;
    background:#fff;
}

.chat-footer input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

.chat-footer button{
    border:none;
    padding:12px 15px;
    border-radius:10px;
    background:#10a37f;
    color:#fff;
    cursor:pointer;
}

/* Quick Buttons */
.quick{
    display:flex;
    gap:8px;
    padding:10px;
    overflow-x:auto;
    background:#fff;
    border-top:1px solid #eee;
}

.quick button{
    border:none;
    background:#eef3f6;
    padding:8px 12px;
    border-radius:30px;
    cursor:pointer;
    white-space:nowrap;
}
</style>
</head>
<body>

<!-- Floating Button -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- Chatbot -->
<div class="chatbox" id="chatbox">

    <div class="chat-header">
        <div>
            <h2>AI Assistant</h2>
            <span>Online 24/7</span>
        </div>
        <button onclick="toggleChat()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">✖</button>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="msg bot">
            Halo 👋 Saya AI Assistant.<br>
            Ada yang bisa saya bantu hari ini?
        </div>
    </div>

    <div class="quick">
        <button onclick="quickAsk('Apa saja paket populer yang tersedia?')">Paket</button>
        <button onclick="quickAsk('Bagaimana cara mendapatkan kupon?')">Kupon</button>
        <button onclick="quickAsk('Bagaimana cara menghubungi admin?')">Kontak</button>
        <button onclick="quickAsk('Apa promo terbaru untuk perjalanan?')">Promo</button>
    </div>

    <div class="chat-footer">
        <input type="text" id="userInput" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
const API_KEY = "YOUR_OPENAI_API_KEY";

let historyChat = [
{
role:"system",
content:`Kamu adalah customer service profesional untuk website Popay Horizon Tour.
Kamu harus menjawab pertanyaan terkait paket wisata, kupon, dan cara kontak.
Informasi penting:
- Halaman paket menampilkan paket Family Fun Getaway, Entry Class Explorer, dan Luxury Island Retreat.
- Halaman kupon menampilkan kupon eksklusif dan penawaran hemat untuk perjalanan.
- Halaman kontak menyediakan WhatsApp resmi 0896-1639-5214, email tourguide.id@gmail.com, serta link media sosial seperti Instagram dan TikTok.
Jawab singkat, jelas, sopan, dan bantu user memilih paket, menemukan kupon, atau menghubungi tim.
Jika pertanyaan tentang pemesanan atau detail paket, arahkan user ke halaman Contact atau WhatsApp untuk konsultasi.
`
}
];

function toggleChat(){
    let box = document.getElementById("chatbox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function quickAsk(text){
    document.getElementById("userInput").value = text;
    sendMessage();
}

function addMessage(text,type){
    let chat = document.getElementById("chatBody");
    chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

    let input = document.getElementById("userInput");
    let text = input.value.trim();

    if(text==="") return;

    addMessage(text,"user");
    input.value="";

    historyChat.push({
        role:"user",
        content:text
    });

    let chat = document.getElementById("chatBody");
    chat.innerHTML += `<div class="msg bot typing" id="typing">AI sedang mengetik...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try{

        const response = await fetch("https://api.openai.com/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + API_KEY
            },
            body:JSON.stringify({
                model:"gpt-4o-mini",
                messages:historyChat,
                temperature:0.7,
                max_tokens:500
            })
        });

        const data = await response.json();

        document.getElementById("typing").remove();

        let reply = data.choices[0].message.content;

        addMessage(reply,"bot");

        historyChat.push({
            role:"assistant",
            content:reply
        });

    }catch(error){

        document.getElementById("typing").remove();

        addMessage("Maaf, terjadi kesalahan koneksi.","bot");
    }
}

/* Auto popup 5 detik */
setTimeout(()=>{
    document.getElementById("chatbox").style.display="flex";
},5000);

</script>

</body>
</html>
